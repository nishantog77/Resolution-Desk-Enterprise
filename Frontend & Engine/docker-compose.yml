version: '3.8'

services:
  # 1. The React Frontend
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080

  # 2. The Java Spring Boot Backend
  java-router:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ./java-backend:/app
    ports:
      - "8080:8080"
    command: mvn spring-boot:run

  # 3. The Python AI Microservice
  python-ai-engine:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./python-backend:/app
    ports:
      - "8000:8000"
    command: sh -c "pip install fastapi uvicorn pydantic chromadb sentence-transformers requests && uvicorn main_api:app --host 0.0.0.0 --port 8000"